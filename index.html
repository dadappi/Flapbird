<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flappy Teriak - IT Club</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #2c3e50;
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
        }

        h1 { color: #f1c40f; margin-bottom: 5px; text-shadow: 2px 2px 0px #000; }
        p { margin-top: 0; color: #bdc3c7; }
        
        #game-container { position: relative; }

        canvas {
            border: 4px solid #34495e;
            border-radius: 10px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.5);
            background-color: #87CEEB;
        }

        #ui-layer {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            background: rgba(0, 0, 0, 0.6); border-radius: 10px;
        }

        button {
            padding: 15px 40px; font-size: 24px; font-weight: bold;
            background-color: #e74c3c; color: white; border: none;
            border-radius: 50px; cursor: pointer; box-shadow: 0 5px 0 #c0392b;
        }
        button:active { transform: translateY(5px); box-shadow: none; }

        #volume-bar-container { width: 400px; height: 20px; background-color: #333; border-radius: 10px; margin-top: 20px; overflow: hidden; border: 2px solid #fff; }
        #volume-bar { height: 100%; width: 0%; background-color: #2ecc71; transition: width 0.1s; }
    </style>
</head>
<body>

    <h1>🐦 Flappy Teriak 🗣️</h1>
    <p>Diam = Jatuh | Ngomong = Terbang | TERIAK = TERBANG TINGGI!</p>

    <div id="game-container">
        <canvas id="gameCanvas" width="400" height="500"></canvas>
        <div id="ui-layer">
            <h2 id="game-over-text" style="display: none; color: #e74c3c; font-size: 40px; text-shadow: 2px 2px #000;">YAH NABRAK!</h2>
            <h3 id="final-score" style="display: none; font-size: 24px;">Skor: 0</h3>
            <button id="start-btn">IZINKAN MIC & MULAI</button>
        </div>
    </div>

    <div style="margin-top: 10px;">Indikator Suara Kamu:</div>
    <div id="volume-bar-container"><div id="volume-bar"></div></div>

    <script>
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");
        const startBtn = document.getElementById("start-btn");
        const uiLayer = document.getElementById("ui-layer");
        const gameOverText = document.getElementById("game-over-text");
        const finalScoreText = document.getElementById("final-score");
        const volumeBar = document.getElementById("volume-bar");

        // Preload bird image
        const birdImage = new Image();
        birdImage.src = "muka-burung-kamu.png";
        let birdImageLoaded = false;
        birdImage.onload = () => {
            birdImageLoaded = true;
        };

        // ==========================================
        // 🎨 FUNCTION UNTUK MENGGAMBAR ASSET
        // ==========================================
        
        // Fungsi menggambar burung dengan image
        function drawBird(x, y, width, height) {
            ctx.save();
            ctx.translate(x, y);
            
            if (birdImageLoaded) {
                // Gambar burung dari image kamu
                ctx.drawImage(birdImage, -width/2, -height/2, width, height);
            } else {
                // Fallback ke gambar primitif jika image belum loaded
                // Kepala burung (kuning)
                ctx.fillStyle = "#FFD700";
                ctx.beginPath();
                ctx.arc(0, -8, 12, 0, Math.PI * 2);
                ctx.fill();
                
                // Mata
                ctx.fillStyle = "#000";
                ctx.beginPath();
                ctx.arc(4, -10, 3, 0, Math.PI * 2);
                ctx.fill();
                
                ctx.fillStyle = "#FFF";
                ctx.beginPath();
                ctx.arc(5, -9, 1.5, 0, Math.PI * 2);
                ctx.fill();
                
                // Paruh (merah)
                ctx.fillStyle = "#FF6347";
                ctx.beginPath();
                ctx.moveTo(10, -8);
                ctx.lineTo(16, -7);
                ctx.lineTo(10, -5);
                ctx.closePath();
                ctx.fill();
                
                // Badan burung (kuning)
                ctx.fillStyle = "#FFD700";
                ctx.beginPath();
                ctx.ellipse(0, 5, 10, 14, 0, 0, Math.PI * 2);
                ctx.fill();
                
                // Sayap (oranye)
                ctx.fillStyle = "#FFA500";
                ctx.beginPath();
                ctx.ellipse(-8, 5, 6, 10, -0.3, 0, Math.PI * 2);
                ctx.fill();
            }
            
            ctx.restore();
        }
        
        // Fungsi menggambar background (awan & rumput)
        function drawBackground(x, y) {
            // Langit (gradient biru)
            const gradient = ctx.createLinearGradient(x, y, x, y + canvas.height);
            gradient.addColorStop(0, "#87CEEB");
            gradient.addColorStop(1, "#E0F6FF");
            ctx.fillStyle = gradient;
            ctx.fillRect(x, y, canvas.width, canvas.height);
            
            // Awan
            drawCloud(x + 50, y + 60, 30);
            drawCloud(x + 200, y + 100, 25);
            drawCloud(x + 350, y + 80, 28);
            
            // Rumput di bawah
            ctx.fillStyle = "#228B22";
            ctx.fillRect(x, y + canvas.height - 40, canvas.width, 40);
            
            // Detail rumput
            ctx.fillStyle = "#32CD32";
            for (let i = 0; i < 20; i++) {
                ctx.fillRect(x + i * 20, y + canvas.height - 35, 3, 15);
            }
        }
        
        function drawCloud(x, y, size) {
            ctx.fillStyle = "rgba(255, 255, 255, 0.8)";
            ctx.beginPath();
            ctx.arc(x, y, size, 0, Math.PI * 2);
            ctx.arc(x + size * 0.8, y - size * 0.3, size * 0.7, 0, Math.PI * 2);
            ctx.arc(x + size * 1.6, y, size * 0.8, 0, Math.PI * 2);
            ctx.fill();
        }
        
        // Fungsi menggambar pipa
        function drawPipe(x, topHeight, gapHeight, isTop) {
            ctx.fillStyle = "#228B22";
            ctx.shadowColor = "rgba(0,0,0,0.3)";
            ctx.shadowBlur = 5;
            
            if (isTop) {
                ctx.fillRect(x, 0, 60, topHeight);
                // Border pipa
                ctx.strokeStyle = "#1a6b1a";
                ctx.lineWidth = 3;
                ctx.strokeRect(x, 0, 60, topHeight);
            } else {
                ctx.fillRect(x, topHeight + gapHeight, 60, canvas.height - (topHeight + gapHeight));
                ctx.strokeStyle = "#1a6b1a";
                ctx.lineWidth = 3;
                ctx.strokeRect(x, topHeight + gapHeight, 60, canvas.height - (topHeight + gapHeight));
            }
            
            ctx.shadowColor = "transparent";
        }
        
        // ==========================================

        let frames = 0, score = 0, gameSpeed = 3;
        let isGameOver = false, isPlaying = false;
        let bgX = 0;
        let audioContext, analyser, microphone, dataArray, volume = 0;
        const MIC_THRESHOLD = 20;
        const GRASS_HEIGHT = 40;

        const bird = {
            x: 50, y: 250,
            width: 40, height: 40,
            velocity: 0, gravity: 0.25, lift: -4,

            draw() {
                drawBird(this.x, this.y, this.width, this.height);
            },

            update() {
                if (volume > MIC_THRESHOLD) this.velocity = this.lift;
                this.velocity += this.gravity;
                this.y += this.velocity;
                // FIX: Deteksi tabrakan dengan rumput dan langit
                if (this.y + this.height / 2 >= canvas.height - GRASS_HEIGHT || this.y - this.height / 2 <= 0) endGame();
            }
        };

        const pipes = [];
        const pipeWidth = 60;
        const pipeGap = 160;

        function drawPipes() {
            for (let i = 0; i < pipes.length; i++) {
                let p = pipes[i];

                // Gambar Pipa Atas & Bawah
                drawPipe(p.x, p.top, pipeGap, true);
                drawPipe(p.x, p.top, pipeGap, false);

                p.x -= gameSpeed;

                // Deteksi tabrakan
                if (
                    bird.x + bird.width / 2 > p.x &&
                    bird.x - bird.width / 2 < p.x + pipeWidth &&
                    (bird.y - bird.height / 2 < p.top || bird.y + bird.height / 2 > p.top + pipeGap)
                ) {
                    endGame();
                }

                // FIX: Gunakan >= untuk scoring yang lebih reliable
                if (p.x + pipeWidth < bird.x && !p.scored) {
                    p.scored = true;
                    score++;
                }
            }
            if (pipes.length > 0 && pipes[0].x < -pipeWidth) pipes.shift();
        }

        async function setupAudio() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                audioContext = new (window.AudioContext || window.webkitAudioContext)();
                analyser = audioContext.createAnalyser();
                microphone = audioContext.createMediaStreamSource(stream);
                microphone.connect(analyser);
                analyser.fftSize = 256;
                dataArray = new Uint8Array(analyser.frequencyBinCount);
                getVolume();
            } catch (err) {
                alert("Gagal akses Mikrofon! Pastikan kamu memberi izin browser.");
            }
        }

        function getVolume() {
            // FIX: Pindahkan guard clause agar tidak nghalangi volume detection
            if (!analyser) {
                requestAnimationFrame(getVolume);
                return;
            }
            
            analyser.getByteFrequencyData(dataArray);
            let sum = 0;
            for (let i = 0; i < dataArray.length; i++) sum += dataArray[i];
            volume = sum / dataArray.length;

            volumeBar.style.width = Math.min(volume * 2, 100) + "%";
            volumeBar.style.backgroundColor = volume > MIC_THRESHOLD ? "#e74c3c" : "#2ecc71";

            requestAnimationFrame(getVolume);
        }

        function gameLoop() {
            if (!isPlaying) return;

            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // Gambar background dengan bergerak
            drawBackground(bgX, 0);
            drawBackground(bgX + canvas.width, 0);

            bgX -= 1;
            if (bgX <= -canvas.width) {
                bgX = 0;
            }

            bird.draw();
            bird.update();

            // Munculkan pipa setiap 100 frame
            if (frames % 100 === 0) {
                let topPipeHeight = Math.random() * (canvas.height - pipeGap - GRASS_HEIGHT - 50) + 20;
                pipes.push({ x: canvas.width, top: topPipeHeight, scored: false });
            }

            drawPipes();

            // Teks Skor di layar utama
            ctx.fillStyle = "rgba(255, 255, 255, 0.9)";
            ctx.font = "bold 60px Arial";
            ctx.fillText(score, canvas.width / 2 - 20, 80);

            frames++;
            if (!isGameOver) requestAnimationFrame(gameLoop);
        }

        function endGame() {
            isGameOver = true;
            isPlaying = false;
            uiLayer.style.display = "flex";
            gameOverText.style.display = "block";
            finalScoreText.style.display = "block";
            finalScoreText.innerText = "Skor Akhir: " + score;
            startBtn.innerText = "MAIN LAGI WOI!";
        }

        function resetGame() {
            bird.y = 250;
            bird.velocity = 0;
            pipes.length = 0;
            score = 0;
            frames = 0;
            bgX = 0;
            isGameOver = false;
            isPlaying = true;
            uiLayer.style.display = "none";
            gameOverText.style.display = "none";
            finalScoreText.style.display = "none";
            gameLoop();
        }

        startBtn.addEventListener("click", async () => {
            if (!audioContext) {
                startBtn.innerText = "MENYIAPKAN MIC...";
                await setupAudio();
            }
            resetGame();
        });
    </script>
</body>
</html>
